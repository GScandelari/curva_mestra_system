name: Deploy — Guilherme Dev (dev-gscandelari.web.app)

on:
  push:
    branches:
      - 'gscandelari_setup'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NODE_ENV: production
          FIREBASE_ADMIN_CREDENTIALS: ${{ secrets.FIREBASE_ADMIN_CREDENTIALS_DEV }}
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyBo23a5eTBBkfFyZ4M04gVa0HB6EAHVDUw
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: curva-mestra-dev.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: curva-mestra-dev
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: curva-mestra-dev.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: 224524575116
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:224524575116:web:b2a51e1e58469a087036a9
          NEXT_PUBLIC_USE_FIREBASE_EMULATORS: false

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Enable Firebase Web Frameworks
        run: firebase experiments:enable webframeworks

      - name: Deploy to Firebase Hosting (dev-gscandelari)
        run: firebase deploy --project curva-mestra-dev --only hosting:dev-gscandelari --token "$FIREBASE_TOKEN_DEV" --force --debug 2>&1 | tee firebase-hosting-debug.log || (cat firebase-hosting-debug.log && exit 1)
        env:
          FIREBASE_TOKEN_DEV: ${{ secrets.FIREBASE_TOKEN_DEV }}
          FIREBASE_ADMIN_CREDENTIALS: ${{ secrets.FIREBASE_ADMIN_CREDENTIALS_DEV }}
          NODE_ENV: production
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyBo23a5eTBBkfFyZ4M04gVa0HB6EAHVDUw
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: curva-mestra-dev.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: curva-mestra-dev
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: curva-mestra-dev.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: 224524575116
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:224524575116:web:b2a51e1e58469a087036a9
          NEXT_PUBLIC_USE_FIREBASE_EMULATORS: false

      - name: Upload Hosting Debug Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: firebase-hosting-debug-log
          path: firebase-hosting-debug.log
          retention-days: 7

      - name: Deployment Summary
        run: |
          echo "Deploy concluido: https://dev-gscandelari.web.app"
          echo "Projeto Firebase: curva-mestra-dev (isolado de producao)"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
