sonar.projectKey=GScandelari_curva_mestra_system
sonar.projectName=Curva Mestra System
sonar.organization=gscandelari

# Source code location
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/__tests__/**/*.test.ts,**/__tests__/**/*.spec.ts

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Language
sonar.language=ts

# Exclude test infrastructure from analysis
sonar.exclusions=**/__mocks__/**

# Exclude Firebase/Next.js dependent code from coverage measurement.
# Pages, components, hooks, and service files call Firestore directly and
# are not unit-tested at MVP — only pure utility modules have coverage.
sonar.coverage.exclusions=src/app/**,src/components/**,src/hooks/**,src/lib/services/**,src/lib/firebase.ts
